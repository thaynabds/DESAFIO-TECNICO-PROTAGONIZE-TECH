<div class="container">

  <a routerLink="/" class="voltar">← Voltar</a>

  <h2>{{ editando ? 'Editar Tarefa' : 'Nova Tarefa' }}</h2>

  <div *ngIf="mensagem" class="alerta" [ngClass]="tipoMensagem === 'sucesso' ? 'alerta-sucesso' : 'alerta-erro'">
    {{ mensagem }}
  </div>

  <div class="form-grupo">
    <label>Título *</label>
    <input type="text" [(ngModel)]="titulo" placeholder="Ex: Estudar Angular" />
  </div>

  <div class="form-grupo">
    <label>Descrição</label>
    <textarea [(ngModel)]="descricao" rows="4" placeholder="Detalhes da tarefa (opcional)"></textarea>
  </div>

  <div class="form-grupo">
    <label>Status</label>
    <select [(ngModel)]="status">
      <option value="Pendente">Pendente</option>
      <option value="Concluída">Concluída</option>
    </select>
  </div>

  <div class="acoes">
    <a routerLink="/" class="btn btn-cancelar">Cancelar</a>
    <button (click)="salvar()" [disabled]="salvando" class="btn btn-salvar">
      {{ salvando ? 'Salvando...' : (editando ? 'Salvar' : 'Criar') }}
    </button>
  </div>

</div>
